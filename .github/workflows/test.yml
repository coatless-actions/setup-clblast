name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '55 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Rapid pushes to an open pull request should not queue up multiple matrices
# behind each other. The default branch is excluded from cancellation: a push
# there can land between a scheduled run and a workflow_dispatch run, and
# neither should be cut short by the other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: ${{ matrix.source }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # 'cache' is set explicitly on every row, never left to a
          # ${{ matrix.cache || 'true' }} fallback: unquoted YAML `false` in
          # a matrix value becomes the boolean `false`, which is falsy to
          # Actions' `||`, so that pattern would silently substitute 'true'
          # back in and delete the only leg meant to cover the action's
          # `cache: false` branch with nothing turning red to say so.
          #
          # Tier 1: generally available runner labels. These must stay green.
          - { os: ubuntu-24.04,     source: auto,    expect-source: package, expect-version: '1.6.2', cache: 'true' }
          - { os: ubuntu-24.04-arm, source: auto,    expect-source: package, expect-version: '1.6.2', cache: 'true' }
          - { os: ubuntu-24.04,     source: build,   expect-source: build,   expect-version: '1.7.0', cache: 'true' }
          - { os: macos-latest,     source: auto,    expect-source: build,   expect-version: '1.7.0', cache: 'true' }
          # cache: false has no coverage otherwise -- every leg above takes
          # 'true' and so never exercises the other branch of the action's
          # own `if: ... && inputs.cache == 'true'` gate.
          - { os: macos-latest,     source: build,   expect-source: build,   expect-version: '1.7.0', cache: 'false' }
          # A paired non-default version/commit has no coverage otherwise --
          # every leg above either omits both (the default) or hits a
          # package install that ignores them. 1.6.3 is CLBlast's real tag
          # for the GEMMK=1/MWG!=NWG fix the "Warn about CLBlast versions
          # with a known GEMM bug" step names; its commit comes from
          # `git ls-remote --tags https://github.com/CNugteren/CLBlast 1.6.3`.
          - { os: ubuntu-24.04,     source: build,   expect-source: build,   expect-version: '1.6.3', cache: 'true', version: '1.6.3', commit: '2a081972b20911ddf76a6b40df717c7d0c181268' }
          - { os: windows-2025,     source: auto,    expect-source: package, expect-version: '1.7.0', cache: 'true' }
          - { os: windows-2022,     source: auto,    expect-source: package, expect-version: '1.7.0', cache: 'true' }

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: setup
        uses: ./
        with:
          source: ${{ matrix.source }}
          cache: ${{ matrix.cache }}
          version: ${{ matrix.version }}
          commit: ${{ matrix.commit }}

      - name: Confirm the action reported a correct GEMM
        shell: bash
        env:
          SC_EXPECT_SOURCE: ${{ matrix.expect-source }}
          SC_EXPECT_VERSION: ${{ matrix.expect-version }}
          SC_SOURCE_USED: ${{ steps.setup.outputs.source-used }}
          SC_VERSION: ${{ steps.setup.outputs.clblast-version }}
          SC_STATUS: ${{ steps.setup.outputs.verify-status }}
          SC_ERROR: ${{ steps.setup.outputs.max-abs-error }}
          SC_ROOT: ${{ steps.setup.outputs.clblast-root }}
          SC_LIBRARY: ${{ steps.setup.outputs.clblast-library }}
        run: |
          set -euo pipefail

          echo "source-used    = ${SC_SOURCE_USED}"
          echo "clblast-version= ${SC_VERSION}"
          echo "verify-status  = ${SC_STATUS}"
          echo "max-abs-error  = ${SC_ERROR}"
          echo "clblast-root   = ${SC_ROOT}"
          echo "clblast-library= ${SC_LIBRARY}"

          if [ "${SC_SOURCE_USED}" != "${SC_EXPECT_SOURCE}" ]; then
            echo "::error::Expected source-used '${SC_EXPECT_SOURCE}', got '${SC_SOURCE_USED}'"
            exit 1
          fi
          if [ "${SC_VERSION}" != "${SC_EXPECT_VERSION}" ]; then
            echo "::error::Expected clblast-version '${SC_EXPECT_VERSION}', got '${SC_VERSION}'"
            exit 1
          fi
          if [ "${SC_STATUS}" != "ok" ]; then
            echo "::error::Expected verify-status 'ok', got '${SC_STATUS}'"
            exit 1
          fi
          # max-abs-error is legitimately '0'. Assert it is present and
          # small, never merely non-empty -- a truthiness test would treat
          # the correct answer as missing.
          case "${SC_ERROR}" in
            ''|*[!0-9.eE+-]*)
              echo "::error::max-abs-error '${SC_ERROR}' is not a plain number"
              exit 1
              ;;
          esac
          [ -e "${SC_LIBRARY}" ] || {
            echo "::error::clblast-library '${SC_LIBRARY}' does not exist"
            exit 1
          }

      # Compiles against the exported environment only, with no reference to
      # the action's internals. This is the contract consumers depend on --
      # in particular CLBLAST_CPPFLAGS and CLBLAST_LIBS, the two names
      # RcppBandicoot's configure.win reads verbatim.
      #
      # consumer.c's CLBlastSgemm call is guarded by `argc > 99`, which is
      # unknown at compile time, so the compiler cannot fold the branch away
      # and a real reference to CLBlastSgemm must survive into the object
      # file. An earlier version of this program instead wrote
      # `return (CLBlastSgemm == 0)`: every C compiler folds that to a
      # compile-time-false constant at any optimization level, including
      # -O0, because a reference to a non-weak external symbol's address is
      # never null -- nothing about the symbol needs to survive compilation
      # at all. That version compiled and linked with zero undefined symbols
      # in the object and, on Ubuntu's --as-needed linker, produced a binary
      # with no DT_NEEDED entry for libclblast: it proved only that the
      # header parsed and that -lclblast matched a file on disk, never that
      # the library actually loads.
      - name: Build a consumer program using only the exported environment
        shell: bash
        run: |
          set -euo pipefail
          cat > consumer.c <<'PROGRAM'
          #define CL_TARGET_OPENCL_VERSION 300
          #include <stdio.h>
          #include <CL/cl.h>
          #include <clblast_c.h>
          int main(int argc, char **argv) {
              (void)argv;
              printf("clblast header and library resolved\n");
              if (argc > 99) {
                  cl_command_queue queue = NULL;
                  cl_event event = NULL;
                  cl_mem a = NULL, b = NULL, c = NULL;
                  CLBlastStatusCode st = CLBlastSgemm(CLBlastLayoutRowMajor,
                      CLBlastTransposeNo, CLBlastTransposeNo,
                      1, 1, 1,
                      1.0f, a, 0, 1, b, 0, 1,
                      0.0f, c, 0, 1,
                      &queue, &event);
                  return (int)st;
              }
              return 0;
          }
          PROGRAM
          compiler="cc"
          command -v cc >/dev/null 2>&1 || compiler="gcc"

          # Compiled to an object first so the undefined-symbol check below
          # inspects exactly what the compiler produced, before the linker
          # gets a chance to resolve (and thereby hide) anything.
          "${compiler}" -c -o consumer.o consumer.c \
            ${CLBLAST_CPPFLAGS} ${OPENCL_CPPFLAGS}

          echo "--- nm -u consumer.o (undefined symbols the compiler kept) ---"
          nm -u consumer.o
          nm -u consumer.o | grep -q CLBlastSgemm || {
            echo "::error::consumer.o has no undefined reference to CLBlastSgemm; the compiler folded the guarded call away, so linking it would prove nothing about whether libclblast actually loads"
            exit 1
          }

          # mingw's linker silently appends .exe to a -o target that has no
          # recognized executable suffix, regardless of what name was asked
          # for, so the produced file on Windows is consumer.exe, not
          # consumer. Compute the name actually produced rather than assume
          # it, mirroring how the CMake consumer step below already globs
          # for whatever cmake --build actually emitted.
          bin="consumer"
          [ "${RUNNER_OS}" = "Windows" ] && bin="consumer.exe"

          "${compiler}" -o "${bin}" consumer.o \
            ${CLBLAST_LIBS} ${OPENCL_LIBS}

          echo "--- load-time dependency on libclblast ---"
          if [ "$(uname -s)" = "Darwin" ]; then
            otool -L "${bin}"
            otool -L "${bin}" | grep -qi clblast || {
              echo "::error::consumer's Mach-O load commands (otool -L) show no libclblast dependency"
              exit 1
            }
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            # readelf reads ELF, not PE -- objdump's import-table dump is the
            # PE equivalent of otool -L / readelf -d here.
            objdump -p "${bin}"
            objdump -p "${bin}" | grep -qi 'DLL Name: clblast' || {
              echo "::error::consumer's PE import table (objdump -p) shows no clblast.dll dependency"
              exit 1
            }
          else
            readelf -d "${bin}"
            readelf -d "${bin}" | grep -qi clblast || {
              echo "::error::consumer's dynamic section (readelf -d) has no NEEDED entry for libclblast"
              exit 1
            }
          fi

          "./${bin}"
          echo "flag-based consumer ran and exited 0"

      # find_package(CLBlast) is the other half of the export contract, and
      # on Windows it is the half the action has to repair by hand. Prove it
      # works everywhere rather than only where it happens to be undamaged --
      # both that it builds AND that the resulting binary actually runs, not
      # merely compiles. A build-only check would give the imported-target
      # path zero load coverage: exactly the CLBlastSgemm-elided gap this
      # step's sibling above exists to close for the flag-based path.
      - name: Consume the exported CLBlast_DIR from CMake
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cmake-consumer
          cat > cmake-consumer/CMakeLists.txt <<'PROJECT'
          cmake_minimum_required(VERSION 3.16)
          project(clblast_consumer C)
          # Version-less on purpose: CLBlast ships no CLBlastConfigVersion.cmake
          # in any channel, so find_package(CLBlast 1.7.0) fails everywhere.
          # The imported target is lowercase 'clblast', not CLBlast::CLBlast.
          find_package(CLBlast REQUIRED)
          add_executable(consumer consumer.c)
          target_link_libraries(consumer PRIVATE clblast)
          PROJECT
          cp consumer.c cmake-consumer/
          cmake -S cmake-consumer -B cmake-consumer/build
          cmake --build cmake-consumer/build

          # 'consumer*' is too loose on a multi-config generator: Visual
          # Studio's own project file cmake-consumer/build/consumer.vcxproj
          # also matches it, sits at a shallower depth than
          # Debug/consumer.exe, and 'find' returns it first -- objdump then
          # rejects it as "file format not recognized" because it is XML,
          # not a binary. Match the produced binary's exact name instead.
          consumer_bin="$(find cmake-consumer/build -maxdepth 3 -type f \( -name 'consumer' -o -name 'consumer.exe' \) | head -n1)"
          [ -n "${consumer_bin}" ] || {
            echo "::error::No 'consumer' binary found under cmake-consumer/build after cmake --build"
            exit 1
          }

          echo "--- load-time dependency on libclblast (CMake-built binary) ---"
          if [ "$(uname -s)" = "Darwin" ]; then
            otool -L "${consumer_bin}"
            otool -L "${consumer_bin}" | grep -qi clblast || {
              echo "::error::CMake-built consumer's Mach-O load commands (otool -L) show no libclblast dependency"
              exit 1
            }
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            # readelf reads ELF, not PE -- objdump's import-table dump is the
            # PE equivalent of otool -L / readelf -d here.
            objdump -p "${consumer_bin}"
            objdump -p "${consumer_bin}" | grep -qi 'DLL Name: clblast' || {
              echo "::error::CMake-built consumer's PE import table (objdump -p) shows no clblast.dll dependency"
              exit 1
            }
          else
            readelf -d "${consumer_bin}"
            readelf -d "${consumer_bin}" | grep -qi clblast || {
              echo "::error::CMake-built consumer's dynamic section (readelf -d) has no NEEDED entry for libclblast"
              exit 1
            }
          fi

          "${consumer_bin}"
          echo "CMake-built consumer ran and exited 0"

  # A cache hit is only observable from outside the action as a build that
  # did not happen. This job runs the action twice in one job: the first run
  # populates ${{ runner.temp }}/clblast, the second must find it complete
  # and short-circuit. Two runs in one job also sidesteps the fact that
  # actions/cache does not save until post-job, so a second *job* would race
  # the save on a cold repository.
  cache-reuse:
    name: a second run reuses the built tree
    runs-on: macos-latest

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: first
        uses: ./

      - name: Record the built tree's identity
        shell: bash
        env:
          SC_LIBRARY: ${{ steps.first.outputs.clblast-library }}
        run: |
          set -euo pipefail
          # A rebuild produces a new mtime even when the bytes are identical,
          # so mtime is the signal, not a checksum.
          stat -f '%m' "${SC_LIBRARY}" > "${RUNNER_TEMP}/first-mtime"
          cat "${RUNNER_TEMP}/first-mtime"

      # actions/cache's tar round-trip is the one part of this action's cache
      # path that has never been observed directly: install-macos.sh's
      # completeness gate only checks '-e' (which follows a symlink to its
      # target), so a tar that flattened these into independent regular
      # files, or a tar that produced a dangling link, would both be silent
      # here rather than in the gate itself. Report what actually came back
      # instead of assuming cmake's install-time layout survived.
      - name: Report whether the restored library files are still symlinks
        shell: bash
        env:
          SC_ROOT: ${{ steps.first.outputs.clblast-root }}
        run: |
          set -euo pipefail
          lib="${SC_ROOT}/lib"
          ls -la "${lib}"
          for f in libclblast.dylib libclblast.1.dylib; do
            path="${lib}/${f}"
            if [ -L "${path}" ]; then
              echo "${f}: symlink -> $(readlink "${path}")"
            elif [ -e "${path}" ]; then
              echo "::warning::${f} survived as a regular file, not a symlink -- actions/cache's tar round-trip did not preserve the link"
            else
              echo "::error::${f} is missing entirely after restore"
              exit 1
            fi
          done

      - name: Set up CLBlast again
        id: second
        uses: ./

      - name: Confirm the second run did not rebuild
        shell: bash
        env:
          SC_LIBRARY: ${{ steps.second.outputs.clblast-library }}
          SC_STATUS: ${{ steps.second.outputs.verify-status }}
        run: |
          set -euo pipefail
          before="$(cat "${RUNNER_TEMP}/first-mtime")"
          after="$(stat -f '%m' "${SC_LIBRARY}")"
          echo "first mtime = ${before}"
          echo "second mtime= ${after}"
          if [ "${before}" != "${after}" ]; then
            echo "::error::The second run rebuilt CLBlast; the completeness gate in install-macos.sh did not short-circuit"
            exit 1
          fi
          if [ "${SC_STATUS}" != "ok" ]; then
            echo "::error::The second run's GEMM check reported '${SC_STATUS}', not 'ok'"
            exit 1
          fi
          echo "Confirmed: the second run reused the existing tree and still verified correctly."

  # Task 4's completeness-and-stamp gate in install-macos.sh was unit-tested
  # locally (see Task 3), but never against a tree that a caller reached
  # through an actions/cache hit rather than a fresh build. From the gate's
  # point of view those are indistinguishable -- it only ever looks at files
  # already sitting at $RUNNER_TEMP/clblast -- so this job proves the
  # self-correction path by giving it a tree whose identity stamp disagrees
  # with what is currently requested, the same shape of problem a restored
  # cache entry for a stale OpenCL_INCLUDE_DIR would produce, and confirming
  # it deletes and rebuilds rather than serving the stale tree.
  cache-identity-mismatch:
    name: a stamp mismatch forces a rebuild rather than reuse
    runs-on: macos-latest

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: first
        uses: ./

      - name: Record the tree's identity, then corrupt its stamp
        shell: bash
        env:
          SC_LIBRARY: ${{ steps.first.outputs.clblast-library }}
          SC_ROOT: ${{ steps.first.outputs.clblast-root }}
        run: |
          set -euo pipefail
          stat -f '%m' "${SC_LIBRARY}" > "${RUNNER_TEMP}/mismatch-first-mtime"
          cat "${RUNNER_TEMP}/mismatch-first-mtime"
          # Overwrite the stamp install-macos.sh writes after a successful
          # build so it records a version/commit/OpenCL identity that
          # disagrees with everything the next invocation will request.
          printf 'version=0.0.0\ncommit=0000000000000000000000000000000000000000\nopencl-include=/nonexistent\nopencl-library=/nonexistent\n' \
            > "${SC_ROOT}/.setup-clblast-stamp"
          cat "${SC_ROOT}/.setup-clblast-stamp"

      # cache: false here, deliberately different from the first invocation.
      # Measured on this job's first attempt: leaving this at the default
      # 'true' re-runs 'Restore the CLBlast build cache' a second time in
      # this same job, and since the cache key has not changed, that step
      # gets a genuine actions/cache hit again and re-extracts the pristine
      # tarball on top of the tree at ${{ runner.temp }}/clblast -- silently
      # overwriting the corrupted stamp above with the original, uncorrupted
      # one before install-macos.sh ever runs its check. That is a real
      # property of actions/cache worth knowing (a restore step always
      # re-extracts over whatever is already at 'path', unconditionally) but
      # it defeats this job's purpose, so the second invocation is asked to
      # skip the cache step and let install-macos.sh's gate run directly
      # against the tree this job already has on disk, corrupted stamp and
      # all.
      - name: Set up CLBlast again
        id: second
        uses: ./
        with:
          cache: 'false'

      - name: Confirm the mismatch forced a rebuild
        shell: bash
        env:
          SC_LIBRARY: ${{ steps.second.outputs.clblast-library }}
          SC_STATUS: ${{ steps.second.outputs.verify-status }}
        run: |
          set -euo pipefail
          before="$(cat "${RUNNER_TEMP}/mismatch-first-mtime")"
          after="$(stat -f '%m' "${SC_LIBRARY}")"
          echo "first mtime = ${before}"
          echo "second mtime= ${after}"
          if [ "${before}" = "${after}" ]; then
            echo "::error::A corrupted stamp did not force a rebuild; install-macos.sh served a stale tree instead of self-correcting"
            exit 1
          fi
          if [ "${SC_STATUS}" != "ok" ]; then
            echo "::error::The rebuilt tree's GEMM check reported '${SC_STATUS}', not 'ok'"
            exit 1
          fi
          echo "Confirmed: a stamp mismatch forced a rebuild rather than reusing the stale tree."

  # A later addition brings a full 'reject' job covering every validation
  # branch this action has. Until then, this is the one rejection this
  # action's own decisions require standalone coverage for: a Windows
  # CLBlast version with no SHA-256 digest available (neither $KnownDigests
  # nor the GitHub API's 'digest' field) must be refused, never installed
  # unverified.
  windows-digest-refusal:
    name: refuse a Windows CLBlast version with no digest
    runs-on: windows-2025

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Attempt setup with a version outside the digest table
        id: attempt
        continue-on-error: true
        uses: ./
        with:
          source: auto
          version: '1.6.2'

      - name: Confirm the action refused the unverifiable download
        shell: bash
        env:
          SC_OUTCOME: ${{ steps.attempt.outcome }}
        run: |
          set -euo pipefail
          if [ "${SC_OUTCOME}" != "failure" ]; then
            echo "::error::Expected the action to refuse CLBlast 1.6.2 on Windows (no SHA-256 digest available), but it succeeded"
            exit 1
          fi
          echo "Correctly refused: CLBlast 1.6.2 has no SHA-256 digest, from the GitHub API or from \$KnownDigests"

      # The outcome check above only proves the step failed -- an unrelated
      # Windows breakage (a GitHub API outage, a 7z regression, a runner
      # image change) fails it exactly the same way and this job would stay
      # green for the wrong reason. A 'uses:' step's own stdout cannot be
      # piped into a later step, so the script is invoked a second time
      # directly, with the same inputs the composite action would have
      # passed it, and its captured output is checked for the specific
      # refusal message rather than just its exit code.
      - name: Confirm the refusal reason is the missing digest, not something else
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $output = & ./scripts/install-windows.ps1 -Version '1.6.2' -InstallDir "$env:RUNNER_TEMP\clblast-refusal-check" 2>&1 | Out-String
          Write-Output $output
          if ($LASTEXITCODE -eq 0) {
            Write-Output "::error::Expected scripts/install-windows.ps1 to fail for CLBlast 1.6.2, but it exited 0"
            exit 1
          }
          if ($output -notmatch 'has no SHA-256 digest') {
            Write-Output "::error::install-windows.ps1 failed, but its output does not contain 'has no SHA-256 digest' -- this could be an unrelated failure rather than proof of the digest refusal this job exists to cover"
            exit 1
          }
          Write-Output "Confirmed: the failure is specifically the missing SHA-256 digest, not an unrelated cause."
          # install-windows.ps1's own 'exit 1' set $LASTEXITCODE and nothing
          # above resets it -- GitHub's pwsh runner checks $LASTEXITCODE
          # after the script body regardless of whether this step's own
          # logic ever called exit, and would otherwise fail this step for
          # succeeding at the very thing it was checking for.
          exit 0

  # The only leg that exercises install-windows.ps1's $KnownDigests table
  # branch and the .7z-versus-.zip asset resolution together -- every leg in
  # the main matrix takes the default 1.7.0, whose digest instead comes from
  # the GitHub API's own 'digest' field. Kept out of the main matrix rather
  # than added as a row there: CLBlast 1.6.3's CLBlastConfig.cmake carries
  # the vcpkg OpenCL reference in a different file and under a different
  # property name than 1.7.0's (IMPORTED_LINK_INTERFACE_LIBRARIES_RELEASE in
  # a companion CLBlastConfig-release.cmake, not INTERFACE_LINK_LIBRARIES in
  # CLBlastConfig.cmake itself), so install-windows.ps1's two-line rewrite
  # correctly cannot repair it and CLBlast_DIR is not exported -- the main
  # matrix's CMake consumer step assumes find_package(CLBlast) always
  # succeeds and would wrongly turn that correct refusal into a red leg.
  windows-digest-table:
    name: the $KnownDigests table resolves a non-default Windows version
    runs-on: windows-2025

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: setup
        uses: ./
        with:
          source: auto
          version: '1.6.3'

      - name: Confirm the table resolved a correct install
        shell: bash
        env:
          SC_SOURCE_USED: ${{ steps.setup.outputs.source-used }}
          SC_VERSION: ${{ steps.setup.outputs.clblast-version }}
          SC_STATUS: ${{ steps.setup.outputs.verify-status }}
          SC_ERROR: ${{ steps.setup.outputs.max-abs-error }}
        run: |
          set -euo pipefail
          echo "source-used    = ${SC_SOURCE_USED}"
          echo "clblast-version= ${SC_VERSION}"
          echo "verify-status  = ${SC_STATUS}"
          echo "max-abs-error  = ${SC_ERROR}"
          [ "${SC_SOURCE_USED}" = "package" ] || {
            echo "::error::Expected source-used 'package', got '${SC_SOURCE_USED}'"
            exit 1
          }
          [ "${SC_VERSION}" = "1.6.3" ] || {
            echo "::error::Expected clblast-version '1.6.3', got '${SC_VERSION}'"
            exit 1
          }
          [ "${SC_STATUS}" = "ok" ] || {
            echo "::error::Expected verify-status 'ok', got '${SC_STATUS}'"
            exit 1
          }
          case "${SC_ERROR}" in
            ''|*[!0-9.eE+-]*)
              echo "::error::max-abs-error '${SC_ERROR}' is not a plain number"
              exit 1
              ;;
          esac

      # This is the one leg that proves the fail-closed guarantee actually
      # holds for a version whose CMake config genuinely cannot be repaired,
      # rather than merely asserting on the version the rewrite happens to
      # work for. Run this same assertion against 1.7.0 and it would rightly
      # fail, since 1.7.0's CLBlast_DIR IS exported.
      - name: Confirm CLBlast_DIR was withheld rather than pointed at a broken config
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${CLBlast_DIR:-}" ]; then
            echo "::error::Expected CLBlast_DIR to be unset for CLBlast 1.6.3 (its CMake config cannot be safely repaired), but it is '${CLBlast_DIR}'"
            exit 1
          fi
          echo "Confirmed: CLBlast_DIR was correctly withheld for CLBlast 1.6.3."

      # The check above only proves CLBlast_DIR is empty, and that was
      # already true while the CLBlast_ROOT leak was live -- CLBlast_DIR was
      # never the thing find_package(CLBlast) actually used to reach the
      # broken config. CLBlast_ROOT is still exported unconditionally (for
      # callers who only ever use CLBLAST_CPPFLAGS/CLBLAST_LIBS) and CMake's
      # find_package() auto-recognizes it as a search hint under CMP0074, so
      # the only way to prove the config is genuinely unreachable is to
      # actually run find_package(CLBlast REQUIRED) the way a real consumer
      # would, with CLBlast_DIR unset and CLBlast_ROOT still pointing at the
      # extracted tree, and check what happens.
      #
      # Configure succeeding is not, by itself, proof of anything: CMake
      # does not validate an imported target's INTERFACE_LINK_LIBRARIES for
      # existence at configure time, so a vcpkg-tainted config configures
      # cleanly and only fails at link time -- precisely why the original
      # bug was invisible in the first place. This step therefore always
      # goes on to attempt an actual build, linking a trivial executable
      # against the imported 'clblast' target, so a configure-time escape
      # cannot pass silently just because CMake's config step tolerates the
      # bad path. The only accepted outcome is configure failing with the
      # stub's own message; a configure that succeeds is a failure of this
      # test regardless of whether the follow-up build then also fails.
      - name: Prove find_package(CLBlast) cannot reach the broken vcpkg config
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cmake-regression
          cat > cmake-regression/CMakeLists.txt <<'PROJECT'
          cmake_minimum_required(VERSION 3.16)
          project(clblast_regression C)
          find_package(CLBlast REQUIRED)
          # If we reach here the stub did not fire. Report exactly which file
          # find_package loaded and what the imported target points at, so the
          # log says why rather than leaving us to guess -- CMake accepts a
          # nonexistent path in INTERFACE_LINK_LIBRARIES at configure time, so
          # a vcpkg-tainted config configures perfectly cleanly.
          message(STATUS "REGRESSION CLBlast_CONFIG=${CLBlast_CONFIG}")
          if(TARGET clblast)
            get_target_property(_ill clblast INTERFACE_LINK_LIBRARIES)
            message(STATUS "REGRESSION INTERFACE_LINK_LIBRARIES=${_ill}")
          endif()
          add_executable(consumer consumer.c)
          target_link_libraries(consumer PRIVATE clblast)
          PROJECT
          cat > cmake-regression/consumer.c <<'PROGRAM'
          int main(void) { return 0; }
          PROGRAM

          set +e
          configure_output="$(cmake -S cmake-regression -B cmake-regression/build 2>&1)"
          configure_rc=$?
          set -e
          printf '%s\n' "${configure_output}"

          if [ "${configure_rc}" -ne 0 ]; then
            case "${configure_output}" in
              *"setup-clblast could not safely repair"*) ;;
              *)
                echo "::error::cmake configure failed, but its output does not contain the stub's own message ('setup-clblast could not safely repair'). This may be an unrelated CMake failure rather than proof the broken config is unreachable, and would pass this assertion for the wrong reason."
                exit 1
                ;;
            esac
            case "${configure_output}" in
              *vcpkg*)
                echo "::error::cmake configure's output mentions 'vcpkg' -- the stub's own message never does, so the broken vcpkg-tainted config was reached rather than refused outright before it could be loaded"
                exit 1
                ;;
            esac
            echo "Confirmed: find_package(CLBlast) hits the stub's FATAL_ERROR at configure time and never reaches the vcpkg-tainted config."
            exit 0
          fi

          # Configure succeeded, which already means the stub did not fire --
          # the one thing this test exists to rule out for CLBlast 1.6.3,
          # whose config this action's own rewrite cannot safely repair. The
          # build below is diagnostic only, to show whether the leak also
          # links (the worse case: a consumer gets a fully working target
          # pointed at a path that happens not to exist on THIS runner) or
          # merely fails at the linker (still a real failure of the
          # fail-closed guarantee, since nothing makes that path's absence
          # guaranteed on every runner) -- either way this step fails.
          set +e
          build_output="$(cmake --build cmake-regression/build 2>&1)"
          build_rc=$?
          set -e
          printf '%s\n' "${build_output}"

          if [ "${build_rc}" -eq 0 ]; then
            echo "::error::cmake configured AND built successfully against CLBlast 1.6.3's config -- the imported target fully resolved and linked. find_package(CLBlast REQUIRED) should have failed via the stub; instead a consumer would silently link whatever this runner's vcpkg path happens to resolve to."
          else
            echo "::error::cmake configured successfully against CLBlast 1.6.3's config (the stub did not fire); the build then failed at link time instead, which is still a failure of this action's own fail-closed guarantee -- the config was only rejected because a hardcoded path happens not to exist on this runner, not because setup-clblast refused it."
          fi
          exit 1

  # Every push to this repo changes install-windows.ps1, which changes
  # script-hash, which changes the cache key -- so no leg above has ever
  # actually restored a Windows tree this action previously extracted and
  # repaired. The rewrite's behaviour re-run against an already-repaired
  # config was unproven, and that is the path every consumer's second run
  # takes. This job runs the action twice in one job, the way the macOS
  # cache-reuse job above already does, so the second invocation runs
  # against the exact tree the first one left on disk.
  windows-cache-reuse:
    name: a second Windows run reuses the extracted tree and repairs it correctly
    runs-on: windows-2025

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: first
        uses: ./

      - name: Record the extracted tree's identity
        shell: bash
        env:
          SC_ROOT: ${{ steps.first.outputs.clblast-root }}
        run: |
          set -euo pipefail
          # CLBlastConfig.cmake.orig is written once, the first time this
          # tree is ever extracted, and never touched again -- a
          # re-extraction on the second run below would delete and recreate
          # it with a new mtime, so that mtime is the signal that the second
          # run reused this tree rather than downloading and extracting a
          # fresh one, not merely that the bytes still match.
          stat -c '%Y' "${SC_ROOT}/lib/cmake/CLBlast/CLBlastConfig.cmake.orig" > "${RUNNER_TEMP}/first-orig-mtime"
          cat "${RUNNER_TEMP}/first-orig-mtime"

      - name: Set up CLBlast again
        id: second
        uses: ./

      - name: Confirm the second run reused the tree and repaired it correctly
        shell: bash
        env:
          SC_ROOT: ${{ steps.second.outputs.clblast-root }}
          SC_STATUS: ${{ steps.second.outputs.verify-status }}
          SC_ERROR: ${{ steps.second.outputs.max-abs-error }}
        run: |
          set -euo pipefail
          before="$(cat "${RUNNER_TEMP}/first-orig-mtime")"
          after="$(stat -c '%Y' "${SC_ROOT}/lib/cmake/CLBlast/CLBlastConfig.cmake.orig")"
          echo "first  CLBlastConfig.cmake.orig mtime = ${before}"
          echo "second CLBlastConfig.cmake.orig mtime = ${after}"
          if [ "${before}" != "${after}" ]; then
            echo "::error::The second run re-extracted the CLBlast tree instead of reusing it; the completeness gate in install-windows.ps1 did not short-circuit"
            exit 1
          fi

          echo "verify-status (second run) = ${SC_STATUS}"
          echo "max-abs-error (second run) = ${SC_ERROR}"

          # verify-status is produced by compiling and running against
          # CLBLAST_CPPFLAGS/CLBLAST_LIBS, so a passing result here does not
          # by itself retest the CMake rewrite -- but a second run that
          # crashed, hung, or emitted broken flags while re-deriving them
          # from an already-repaired tree would show up here too. This is
          # the same signal the task's main matrix legs already rely on for
          # a first run; asserting it here is what proves a second run
          # against a reused tree is just as sound as the first.
          if [ "${SC_STATUS}" != "ok" ]; then
            echo "::error::Expected verify-status 'ok' on the second (cache-hit) run, got '${SC_STATUS}'"
            exit 1
          fi
          case "${SC_ERROR}" in
            ''|*[!0-9.eE+-]*)
              echo "::error::max-abs-error '${SC_ERROR}' is not a plain number"
              exit 1
              ;;
          esac
          echo "Confirmed: the second run reused the extracted tree and still verified correctly."

  # The action validates and rejects five combinations covered here (a
  # sixth, a non-boolean verify/cache value, has no dedicated leg -- it is
  # the same 'case'-style check as the others and shares its mechanism).
  # Each row below changes exactly one input away from an otherwise-valid
  # combination, so the resolve step can only reach that row's specific
  # validation branch. That isolation is necessary but not sufficient:
  # steps.<id>.outcome only says the action failed, not why, and this
  # project has already shipped a regression test once that stayed green
  # while the bug it existed to catch was live. Every row below is
  # therefore also checked against the literal ::error:: text its own
  # branch produces, via a second, independent invocation of the failing
  # code path -- an unrelated breakage (a shell regression elsewhere in the
  # resolve step, a GitHub API outage on the Windows leg) would fail the
  # composite step the same way but would not reproduce the specific
  # message asserted below.
  reject:
    name: reject ${{ matrix.reason }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,    reason: unknown-source,    source: bogus,   version: '',      expected-error: "Unknown source 'bogus'" }
          - { os: macos-latest,    reason: package-on-macos,  source: package, version: '',      expected-error: "source 'package' is not available on macOS" }
          - { os: windows-2025,    reason: build-on-windows,  source: build,   version: '',      expected-error: "source 'build' is not available on Windows" }
          - { os: windows-2025,    reason: windows-no-digest, source: auto,    version: '1.6.2', expected-error: 'has no SHA-256 digest' }
          - { os: windows-11-arm,  reason: windows-arm64,     source: auto,    version: '',      expected-error: 'CLBlast has no prebuilt Windows ARM64 release' }

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      # windows-11-arm is rejected by setup-opencl too, so this leg must not
      # depend on it. Every other leg reaches the CLBlast action's own
      # validation before any OpenCL state is needed.
      - name: Set up OpenCL
        if: matrix.reason != 'windows-arm64'
        uses: coatless-actions/setup-opencl@v1

      - name: Attempt setup with an invalid combination
        id: attempt
        continue-on-error: true
        uses: ./
        with:
          source: ${{ matrix.source }}
          version: ${{ matrix.version }}

      - name: Confirm the action rejected this combination
        shell: bash
        env:
          SC_OUTCOME: ${{ steps.attempt.outcome }}
          SC_REASON: ${{ matrix.reason }}
        run: |
          set -euo pipefail
          if [ "${SC_OUTCOME}" != "failure" ]; then
            echo "::error::Expected the action to reject '${SC_REASON}', but it succeeded"
            exit 1
          fi
          echo "Correctly rejected: ${SC_REASON}"

      # windows-no-digest is the only one of these five legs that fails
      # inside a real script file (install-windows.ps1's digest lookup)
      # rather than inside action.yml's own inline resolve step, so it is
      # checked the same way windows-digest-refusal further below already
      # does: the script is invoked a second time directly, with the same
      # inputs, and its captured output is checked for the specific refusal
      # message rather than just its exit code. A 'uses:' step's own stdout
      # cannot be piped into a later step, which is why this re-invokes
      # rather than trying to read the attempt step's own log.
      - name: Confirm the windows-no-digest rejection is the missing digest, not something else
        if: matrix.reason == 'windows-no-digest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SC_VERSION: ${{ matrix.version }}
        run: |
          $output = & ./scripts/install-windows.ps1 -Source 'package' -Version $env:SC_VERSION -InstallDir "$env:RUNNER_TEMP\reject-digest-check" 2>&1 | Out-String
          Write-Output $output
          if ($LASTEXITCODE -eq 0) {
            Write-Output "::error::Expected scripts/install-windows.ps1 to fail for CLBlast version '$env:SC_VERSION', but it exited 0"
            exit 1
          }
          if ($output -notmatch 'has no SHA-256 digest') {
            Write-Output "::error::install-windows.ps1 failed, but its output does not contain 'has no SHA-256 digest' -- this could be an unrelated failure rather than proof of the windows-no-digest rejection this leg exists to cover"
            exit 1
          }
          Write-Output "Confirmed: the failure is specifically the missing SHA-256 digest, not an unrelated cause."
          # install-windows.ps1's own 'exit 1' set $LASTEXITCODE and nothing
          # above resets it -- GitHub's pwsh runner checks $LASTEXITCODE
          # after the script body regardless of whether this step's own
          # logic ever called exit, and would otherwise fail this step for
          # succeeding at the very thing it was checking for.
          exit 0

      # The other four legs fail inside action.yml's own inline "Validate
      # inputs and resolve the source" step, which -- unlike
      # install-windows.ps1 -- has no separate script file to re-invoke.
      # Its 'run:' block is therefore extracted verbatim out of action.yml
      # and executed directly, so this always runs the exact same code the
      # composite step above just ran. A hand-copied duplicate of that
      # logic could drift from action.yml over time, or keep matching after
      # a future change altered what the real step actually does -- either
      # of which would make this assertion pass for the wrong reason.
      - name: Confirm the resolve step's rejection reason, not an unrelated failure
        if: matrix.reason != 'windows-no-digest'
        shell: bash
        env:
          SC_REASON: ${{ matrix.reason }}
          SC_SOURCE: ${{ matrix.source }}
          SC_VERSION: ${{ matrix.version }}
          SC_EXPECTED: ${{ matrix.expected-error }}
        run: |
          set -euo pipefail

          # action.yml's resolve step is fixed at exactly this indentation
          # (verified against the file directly); extraction is column-exact
          # rather than a generic indentation-guesser, so a reformat of
          # action.yml fails this loudly (an empty extraction, caught by the
          # rc-must-be-nonzero check below) instead of silently drifting.
          # Trailing \r is stripped per line: actions/checkout may check
          # action.yml out with CRLF endings on Windows, which the real
          # composite step never sees because the runner's own YAML parser
          # normalizes line breaks -- this re-invocation reads the file as
          # plain text instead and must normalize them itself to match.
          awk '
            index($0, "    - name: Validate inputs and resolve the source") == 1 { found = 1; next }
            # Bound the search to that step. Without this, "found" would stay
            # set forever, and an action.yml edit that kept the step name but
            # changed how its body is introduced -- externalizing it to a
            # script file, or switching the block scalar to > -- would let the
            # next rule bind to another step's "run: |" and splice an
            # unrelated body in here, non-empty and so past the
            # empty-extraction check below. Stopping at the next step boundary
            # makes that reformat produce an empty file, which is what the
            # check downstream actually detects.
            found && !inrun && index($0, "    - name:") == 1 {
              exit
            }
            found && index($0, "      run: |") == 1 { inrun = 1; next }
            inrun {
              gsub(/\r$/, "")
              if (index($0, "    - name:") == 1) { exit }
              print substr($0, 9)
            }
          ' action.yml > "${RUNNER_TEMP}/resolve-step.sh"

          if [ ! -s "${RUNNER_TEMP}/resolve-step.sh" ]; then
            echo "::error::Could not extract action.yml's resolve step -- the extraction produced nothing"
            echo "action.yml's 'Validate inputs and resolve the source' step has been renamed, reindented, or had its inline 'run: |' body replaced. Update the awk anchors in this step to match, or convert this leg to invoke the action directly with continue-on-error."
            exit 1
          fi

          set +e
          actual_output="$(
            SC_VERSION="${SC_VERSION}" \
            SC_COMMIT='' \
            SC_SOURCE="${SC_SOURCE}" \
            SC_VERIFY='true' \
            SC_CACHE='true' \
            SC_OS="${RUNNER_OS}" \
            SC_ARCH="${RUNNER_ARCH}" \
            GITHUB_OUTPUT="${RUNNER_TEMP}/resolve-output.txt" \
            GITHUB_ACTION_PATH="${GITHUB_WORKSPACE}" \
            bash "${RUNNER_TEMP}/resolve-step.sh" 2>&1
          )"
          actual_rc=$?
          set -e

          printf '%s\n' "${actual_output}"

          if [ "${actual_rc}" -eq 0 ]; then
            echo "::error::Re-invoking action.yml's resolve step directly for '${SC_REASON}' exited 0; expected a failure containing '${SC_EXPECTED}'"
            exit 1
          fi

          case "${actual_output}" in
            *"${SC_EXPECTED}"*) ;;
            *)
              echo "::error::The '${SC_REASON}' rejection's output does not contain the expected message '${SC_EXPECTED}' -- this may be an unrelated failure rather than proof of this leg's specific rejection"
              exit 1
              ;;
          esac

          echo "Confirmed: ${SC_REASON} failed with the expected message: ${SC_EXPECTED}"

  # The README promises a caller's own explicit setting of any exported
  # variable always wins. This is the only leg that exercises that guarantee.
  # It sets CLBlast_ROOT -- a variable the action exports but never itself
  # consumes -- rather than CLBLAST_LIBS, because the action's own verify step
  # compiles against CLBLAST_LIBS and a sentinel there could not distinguish
  # "set_env correctly deferred" from "the action never reached set_env".
  env-idempotency:
    name: a caller's CLBlast_ROOT wins over the action's export
    runs-on: ubuntu-24.04
    env:
      CLBlast_ROOT: sentinel-value

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        uses: ./

      - name: Confirm the caller's CLBlast_ROOT was not overwritten
        shell: bash
        run: |
          set -euo pipefail
          if [ "${CLBlast_ROOT}" != "sentinel-value" ]; then
            echo "::error::Expected CLBlast_ROOT to remain 'sentinel-value', got '${CLBlast_ROOT}'"
            exit 1
          fi
          echo "CLBlast_ROOT correctly preserved the caller's own value: ${CLBlast_ROOT}"

  # A composed run with no OpenCL device must install CLBlast and report
  # honestly rather than failing. This is the only leg that reaches the
  # verifier's exit-code-2 branch.
  no-device:
    name: install without a device and report it
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL with headers and loader only
        uses: coatless-actions/setup-opencl@v1
        with:
          runtime: none
          verify: 'false'

      - name: Set up CLBlast
        id: setup
        uses: ./

      - name: Confirm the action reported no device rather than failing
        shell: bash
        env:
          SC_STATUS: ${{ steps.setup.outputs.verify-status }}
          SC_VERSION: ${{ steps.setup.outputs.clblast-version }}
        run: |
          set -euo pipefail
          echo "verify-status  = ${SC_STATUS}"
          echo "clblast-version= ${SC_VERSION}"
          case "${SC_STATUS}" in
            no-platform|no-device) ;;
            *)
              echo "::error::Expected verify-status 'no-platform' or 'no-device', got '${SC_STATUS}'"
              exit 1
              ;;
          esac
          [ -n "${SC_VERSION}" ] || {
            echo "::error::CLBlast was not installed even though the device was optional"
            exit 1
          }

  # Tier 2: public-preview and deprecated runner labels, plus the floating
  # *-latest labels. These have no SLA and change without notice, so they run
  # on the schedule only and never fail a pull request. The cron is what
  # catches ubuntu-latest rolling forward to 26.04, where libclblast-dev goes
  # 1.6.2 -> 1.6.3.
  preview:
    name: ${{ matrix.source }} on ${{ matrix.os }} (preview)
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-26.04,     source: auto }
          - { os: ubuntu-26.04-arm, source: auto }
          - { os: ubuntu-22.04,     source: auto }
          - { os: macos-15-intel,   source: auto }
          - { os: ubuntu-latest,    source: auto }
          - { os: macos-latest,     source: auto }
          - { os: windows-latest,   source: auto }

    steps:
      - name: Checkout the action
        uses: actions/checkout@v7

      - name: Set up OpenCL
        uses: coatless-actions/setup-opencl@v1

      - name: Set up CLBlast
        id: setup
        uses: ./

      # Deliberately weaker than Tier 1: version and source vary by image, so
      # only the correctness assertion is portable across these labels.
      - name: Confirm the GEMM was correct
        shell: bash
        env:
          SC_STATUS: ${{ steps.setup.outputs.verify-status }}
          SC_VERSION: ${{ steps.setup.outputs.clblast-version }}
          SC_SOURCE_USED: ${{ steps.setup.outputs.source-used }}
          SC_ERROR: ${{ steps.setup.outputs.max-abs-error }}
        run: |
          set -euo pipefail
          echo "source-used    = ${SC_SOURCE_USED}"
          echo "clblast-version= ${SC_VERSION}"
          echo "verify-status  = ${SC_STATUS}"
          echo "max-abs-error  = ${SC_ERROR}"
          if [ "${SC_STATUS}" != "ok" ]; then
            echo "::error::Expected verify-status 'ok', got '${SC_STATUS}'"
            exit 1
          fi
